<!DOCTYPE html>
<html class="light" lang="en">
<head>
<link rel="dns-prefetch" href="//fonts.googleapis.com"/>
<link rel="dns-prefetch" href="//fonts.gstatic.com"/>
<link rel="dns-prefetch" href="//cdn.tailwindcss.com"/>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Login | The Coming King Ministries</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet"/>
<style>
  body { font-family: 'Inter', sans-serif; }
  h1,h2,h3,h4 { font-family: 'Montserrat', sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .login-bg {
    background: linear-gradient(135deg, #1a1c1d 0%, #2d3132 50%, #1a1c1d 100%);
    min-height: 100vh;
  }
</style>
</head>
<body class="login-bg flex items-center justify-center px-4 py-12">

  <div class="w-full max-w-md">
    <!-- Logo & Header -->
    <div class="text-center mb-10">
      <img src="IMG_7893.PNG" alt="The Coming King Ministries" class="h-20 w-20 object-contain rounded-full mx-auto mb-4 border-2 border-primary shadow-xl"/ loading="eager" fetchpriority="high">
      <h1 class="text-2xl font-bold text-white tracking-tight" style="font-family:'Montserrat',sans-serif;">The Coming King Ministries</h1>
      <p class="text-white/50 text-xs uppercase tracking-widest mt-1">Admin Portal</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <h2 class="text-xl font-bold text-gray-900 mb-2" style="font-family:'Montserrat',sans-serif;">Welcome Back</h2>
      <p class="text-sm text-gray-500 mb-6">Sign in to access the ministry admin portal</p>

      <form onsubmit="handleLogin(event)" class="space-y-5">
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Email Address</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-[20px]">email</span>
            <input id="username" type="email" placeholder="Enter your email" class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-red-500/20 focus:border-red-500 transition-all" required/>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Password</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-[20px]">lock</span>
            <input id="password" type="password" placeholder="Enter your password" class="w-full pl-10 pr-12 py-3 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-red-500/20 focus:border-red-500 transition-all" required/>
            <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <span id="eye-icon" class="material-symbols-outlined text-[20px]">visibility</span>
            </button>
          </div>
        </div>

        <div id="login-error" class="hidden p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600 flex items-center gap-2">
          <span class="material-symbols-outlined text-[18px]">error</span>
          <span>Invalid username or password. Please try again.</span>
        </div>

        <button id="login-btn" type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl text-sm transition-all shadow-lg hover:shadow-xl active:scale-[0.98] flex items-center justify-center gap-2">
          <span class="material-symbols-outlined text-[20px]">login</span>
          Sign In
        </button>
      </form>

      <div class="mt-6 pt-6 border-t border-gray-100">
        <p class="text-xs text-center text-gray-400">The Coming King Ministries — Admin Portal</p>
      </div>
    </div>

    <!-- Back to site -->
    <div class="text-center mt-6">
      <a href="home_page_the_coming_king_ministries.html" class="text-white/40 hover:text-white/70 text-xs transition-colors flex items-center gap-1 justify-center">
        <span class="material-symbols-outlined text-[16px]">arrow_back</span> Back to Website
      </a>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDmoTnhEFG1QYV7GHL0Ag3ICiGwWidcWkY",
    authDomain: "thecomingkingministries-26250.firebaseapp.com",
    projectId: "thecomingkingministries-26250",
    storageBucket: "thecomingkingministries-26250.firebasestorage.app",
    messagingSenderId: "1060064890115",
    appId: "1:1060064890115:web:7ae456f7690f596c912d36"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Role → redirect map
  const roleRedirects = {
    super: 'admin-super.html',
    content: 'admin-content.html',
    media: 'admin-media.html'
  };

  window.handleLogin = async function(e) {
    e.preventDefault();
    const email = document.getElementById('username').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');

    errorEl.classList.add('hidden');
    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined text-[20px] animate-spin">progress_activity</span> Signing in...';

    try {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      // Look up role in Firestore
      const roleDoc = await getDoc(doc(db, 'admin_roles', cred.user.uid));
      let role = 'content'; // default
      if (roleDoc.exists()) {
        const rawRole = roleDoc.data().role.toLowerCase().trim();
        if (rawRole === 'super' || rawRole === 'super admin') role = 'super';
        else if (rawRole === 'media' || rawRole === 'media admin') role = 'media';
        else role = 'content';
      } else {
        // Fallback: detect by email
        if (email.includes('superadmin')) role = 'super';
        else if (email.includes('media')) role = 'media';
        else role = 'content';
      }
      sessionStorage.setItem('tck_role', role);
      sessionStorage.setItem('tck_user', email);
      sessionStorage.setItem('tck_uid', cred.user.uid);
      window.location.href = roleRedirects[role] || 'admin-super.html';
    } catch (err) {
      btn.disabled = false;
      btn.innerHTML = '<span class="material-symbols-outlined text-[20px]">login</span> Sign In';
      errorEl.classList.remove('hidden');
      const msgEl = errorEl.querySelector('span:last-child');
      if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found') {
        msgEl.textContent = 'Invalid email or password. Please try again.';
      } else if (err.code === 'auth/too-many-requests') {
        msgEl.textContent = 'Too many failed attempts. Please wait a few minutes and try again.';
      } else {
        msgEl.textContent = 'Sign in failed. Check your connection and try again.';
      }
      document.getElementById('password').value = '';
    }
  };

  window.togglePassword = function() {
    const input = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.textContent = 'visibility_off';
    } else {
      input.type = 'password';
      icon.textContent = 'visibility';
    }
  };
</script>
</body>
</html>
